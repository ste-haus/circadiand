# circadiand configuration.
#
# Optional: where the circadiand SSH identity keypair lives. Defaults to this
# config file's directory (circadiand + circadiand.pub). The CIRCADIAND_SSH_KEY /
# CIRCADIAND_SSH_PUBLIC_KEY env vars override this. If the files don't exist,
# a new ed25519 keypair is generated at the resolved location.
# identity:
#   private_key: /config/circadiand
#   public_key: /config/circadiand.pub

# Global power defaults pick the method per action for any host that doesn't
# set its own, so you don't repeat e.g. "down: ssh" on every host.
defaults:
  power:
    up: wol
    down: ssh

# Monitor every host that defines the named method (unless the host sets its
# own health below). Shorthand for {type: ping, interval: 10}.
health: ping

hosts:
  nas:
    host: "192.168.1.10"             # the machine's address, shared by ssh/ping
    # Per-host power methods, overriding the global defaults.
    power:
      up: ipmi
      down: ssh
    # Monitor nas specifically; takes precedence over the top-level health. Use
    # the mapping form when you want a non-default interval.
    health:
      type: ping
      interval: 5                    # probe the nas more often than the default
    methods:
      - type: wol
        mac: "aa:bb:cc:dd:ee:ff"
        broadcast: "192.168.1.255"   # optional
        count: 10                    # optional, magic packets to send (default 10)
      - type: ipmi
        host: "192.168.1.50"         # the BMC, a separate IP from host above
        username: "ADMIN"
        password: "changeme"
      - type: ssh                    # inherits host: 192.168.1.10
        username: "circadiand"
        # key_path defaults to $CIRCADIAND_SSH_KEY
      - type: ping                   # inherits host: 192.168.1.10

  workstation:
    host: "192.168.1.20"
    # No per-host power -> inherits defaults.power (up=wol, down=ssh) and the
    # global health default (ping) because it defines a ping method below.
    methods:
      - type: wol
        mac: "11:22:33:44:55:66"
      - type: ssh
        username: "circadiand"
      - type: ping
